{
  "name": "pm.discovery",
  "version": "1.0",
  "description": "Analyze a raw user requirement into a structured discovery result.",
  "role": "pm",
  "intent": "analyze and clarify requirements",
  "instructions": "Analyze the requirement and return JSON with summary, open_questions, and constraints.",
  "required_inputs": ["requirement", "conversation"],
  "optional_inputs": [],
  "output_keys": ["summary", "open_questions", "constraints"],
  "output_schema": {
    "type": "object",
    "required": ["summary", "open_questions", "constraints"]
  },
  "allowed_tool_tags": ["repo.read", "repo.search", "code.parse"],
  "default_tool_chain": ["repo_reader", "rg_search", "py_tree_sitter_parse"],
  "side_effect_level": "read",
  "metadata": {"source": "builtin"}
}
