{
  "name": "coder.tdd",
  "version": "1.0",
  "description": "Implement tasks via a test-driven development slice.",
  "role": "coder",
  "intent": "apply tdd to implementation work",
  "instructions": "Follow a TDD slice and return JSON with test_files, modified_files, and summary.",
  "required_inputs": ["plan", "current_files", "task_description"],
  "optional_inputs": [],
  "output_keys": ["test_files", "modified_files", "summary"],
  "output_schema": {
    "type": "object",
    "required": ["test_files", "modified_files", "summary"]
  },
  "allowed_tool_tags": ["repo.read", "code.patch", "test.run"],
  "default_tool_chain": ["repo_reader", "patch_applier", "test_runner"],
  "side_effect_level": "write",
  "metadata": {"source": "builtin"}
}
