{
  "name": "reviewer.code_review",
  "version": "1.0",
  "description": "Review a change set for correctness, risk, and missing checks.",
  "role": "reviewer",
  "intent": "code review change set",
  "instructions": "You are the reviewer code-review skill. Return JSON with approved, issues, risk_level, and summary. Focus on bugs, regressions, unsafe changes, and obvious missing validation or tests. If there are no material problems, set approved=true and issues=[]. Use risk_level as low, medium, or high.",
  "required_inputs": [
    "plan",
    "code_files",
    "test_results"
  ],
  "optional_inputs": [],
  "output_keys": [
    "approved",
    "issues",
    "risk_level",
    "summary"
  ],
  "output_schema": {
    "type": "object",
    "required": [
      "approved",
      "issues",
      "risk_level",
      "summary"
    ]
  },
  "allowed_tool_tags": [
    "diff.read",
    "security.scan",
    "diff.syntax"
  ],
  "default_tool_chain": [
    "diff_reader",
    "semgrep_scan",
    "difftastic_diff"
  ],
  "side_effect_level": "read",
  "metadata": {
    "source": "builtin"
  }
}
