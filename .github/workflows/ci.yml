name: CI

on:
  push:
  pull_request:

jobs:
  layered-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run layered test suites
        run: |
          pytest tests/unit tests/component tests/api tests/contracts tests/integration tests/scenario -q

  default-suite:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install pytest-cov

      - name: Run default suite with coverage gate
        run: |
          pytest \
            --cov=api \
            --cov=director \
            --cov=graph \
            --cov=llm \
            --cov=wecom_bot_bridge \
            --cov=workspace \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -q
