[pytest]
testpaths = tests
addopts = --strict-markers -m "not live and not slow and not network and not docker"
markers =
    unit: pure logic tests without app or network setup
    component: single service collaboration tests with fake dependencies
    api: HTTP contract tests for FastAPI routes
    integration: multi-component in-process integration tests
    scenario: business workflow replay or acceptance-style tests
    contract: external dependency payload contract tests
    live: real external dependency tests
    slow: intentionally slower tests excluded from the default suite
    network: tests that require outbound network access
    docker: tests that require a real Docker runtime
norecursedirs =
    __pycache__
